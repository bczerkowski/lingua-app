name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # Pinned to the version verified locally. `channel: stable` floats to
          # the newest stable, which shipped a web-engine change that
          # white-screened this build; pin to keep CI == verified build.
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - run: flutter pub get

      # Generate the Drift code (database.g.dart) before building.
      - run: dart run build_runner build --delete-conflicting-outputs

      # Project Pages are served from /<repo>/, so the base href must match.
      - run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
