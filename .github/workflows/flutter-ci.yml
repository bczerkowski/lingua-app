name: Flutter CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'server/**'
  pull_request:
    paths-ignore:
      - 'server/**'
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Generate the Drift code (database.g.dart) before analysis/tests.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test
