<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lexicon — a Polish–English dictionary and spaced-repetition flashcard app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lexicon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lexicon</title>
  <link rel="manifest" href="manifest.json">

  <script>
    {{flutter_build_config}}
  </script>
</head>
<body>
  <script>
    // Always load the latest version: unregister any previously-installed
    // service worker and clear its caches, and never register a new one.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
          .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
          .catch(function () {});
    }
    if (window.caches) {
      caches.keys()
          .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
          .catch(function () {});
    }
  </script>

  <!-- Manual Flutter init WITHOUT a service worker (no serviceWorkerSettings). -->
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.load({
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
