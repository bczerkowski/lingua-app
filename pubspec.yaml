name: lingua_app
description: "Polish–English bilingual dictionary + SRS flashcard learning app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Modern typeface (Inter) for the app's type system.
  google_fonts: ^6.2.1

  # Persistent first-run flags (seed-once, one-time cleanup).
  shared_preferences: ^2.3.2

  # Local-first database (SQLite, type-safe).
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking for the AI image-gen backend proxy.
  dio: ^5.7.0

  # Native text-to-speech (Polish + English).
  flutter_tts: ^4.2.0

  # Manual image input: pick PNG/JPG/PDF files, paste screenshots, rasterize PDF.
  file_picker: ^8.1.2
  pasteboard: ^0.3.0
  printing: ^5.13.3

  # CSV import (e.g. Quizlet exports).
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Drift code generation.
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/sample_deck.json
